<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Anadeco Tools</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Poppins',sans-serif;

background:#edf2f7;

}

header{

background:#0d4d95;

color:white;

padding:30px;

text-align:center;

box-shadow:0 3px 10px rgba(0,0,0,.2);

}

.logo{

font-size:36px;

font-weight:700;

letter-spacing:1px;

}

.subtitulo{

margin-top:8px;

font-size:18px;

opacity:.9;

}

main{

max-width:900px;

margin:40px auto;

padding:20px;

}

.card{

background:white;

border-radius:18px;

padding:30px;

box-shadow:0 10px 25px rgba(0,0,0,.08);

margin-bottom:30px;

}

h2{

color:#0d4d95;

margin-bottom:25px;

}

label{

display:block;

margin-top:18px;

margin-bottom:8px;

font-weight:600;

}

input,select{

width:100%;

padding:14px;

font-size:16px;

border-radius:10px;

border:1px solid #d6d6d6;

outline:none;

}

input:focus,
select:focus{

border:1px solid #0d4d95;

}

.grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:20px;

}

@media(max-width:700px){

.grid{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<header>

<div class="logo">

<img src="logo-anadeco.png"
     alt="Anadeco"
     style="width:320px; height:auto;">

</div>

<div class="subtitulo">

Calculadora Anadeco

</div>

</header>

<main>

<div class="card">

<h2>Datos de la instalación</h2>

<div class="grid">

<div>

<label>Modo de cálculo</label>

<select>

<option>Metros cuadrados</option>

<option>Cajas</option>

</select>

</div>

<div>

<label>Tipo de instalación</label>

<select>

<option>Diáfana</option>

<option selected>Estándar</option>

<option>Muy compartimentada</option>

</select>

</div>

</div>

</div>
<div class="card">

<h2>Cálculo</h2>

<div class="grid">

<div>

<label>Metros cuadrados</label>

<input type="number" id="m2" placeholder="Ejemplo: 144">

</div>

<div>

<label>Longitud de barra</label>

<select id="barra">

<option value="2.20">2,20 m</option>

<option value="2.40">2,40 m</option>

<option value="2.50">2,50 m</option>

</select>

</div>

<div>

<label>Merma</label>

<select id="merma">

<option value="0">0%</option>

<option value="5">5%</option>

<option value="7">7%</option>

<option value="10">10%</option>

</select>

</div>
</div>

<div>

<label>Resultado</label>

<div style="background:#f5f7fb;border-radius:12px;padding:20px;border:2px solid #0d4d95;">

<p><strong>Superficie:</strong> <span id="superficie">0 m²</span></p>

<p><strong>Rodapié:</strong> <span id="rodapie">0 ml</span></p>

<p><strong>Barras:</strong> <span id="barras">0</span></p>

</div>

</div>

 </div>

 </div>

 </main>
<script>

const m2=document.getElementById("m2");
const barra=document.getElementById("barra");
const merma=document.getElementById("merma");

const superficie=document.getElementById("superficie");
const rodapie=document.getElementById("rodapie");
const barras=document.getElementById("barras");

function calcular(){

let metros=parseFloat(m2.value)||0;

let coef=0.80;

let longitud=parseFloat(barra.value);

let desperdicio=1+(parseFloat(merma.value)/100);

let ml=(metros*coef)*desperdicio;

let num=Math.ceil(ml/longitud);

superficie.textContent=metros.toFixed(2)+" m²";
rodapie.textContent=ml.toFixed(2)+" ml";
barras.textContent=num;

}

m2.addEventListener("input",calcular);

barra.addEventListener("change",calcular);

merma.addEventListener("change",calcular);

</script>





</body>

</html>
